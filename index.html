<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mdNotes</title>
<style>
  :root {
    --bg: #fbfaf7; --panel: #ffffff; --ink: #2b2a26; --ink-soft: #6b6862; --ink-faint: #9a978f;
    --line: #e8e5dd; --line-soft: #f0ede5; --link: #2f6f5e; --link-bg: #e8f1ed; --link-empty: #b0673e;
    --accent: #2f6f5e; --sel: #d7ebe3;
    --shadow: 0 1px 2px rgba(43,42,38,.04), 0 4px 16px rgba(43,42,38,.05);
    --mono: "SF Mono", "JetBrains Mono", ui-monospace, "Menlo", monospace;
    --sans: -apple-system, "Hiragino Kaku Gothic ProN", "Hiragino Sans", system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body { font-family: var(--sans); background: var(--bg); color: var(--ink); font-size: 15px; line-height: 1.7; -webkit-font-smoothing: antialiased; }
  button { font-family: inherit; cursor: pointer; }

  /* ---------- 3-pane layout ---------- */
  #app { display: grid; grid-template-columns: 232px 228px 1fr; height: 100vh; }
  #app.left-collapsed { grid-template-columns: 228px 1fr; }
  #app.mid-collapsed { grid-template-columns: 232px 1fr; }
  #app.left-collapsed.mid-collapsed { grid-template-columns: 1fr; }
  #app.left-collapsed #left { display: none; }
  #app.mid-collapsed #mid { display: none; }
  #left  { background: var(--panel); border-right: 1px solid var(--line); display: flex; flex-direction: column; min-height: 0; }
  #mid   { background: var(--bg); border-right: 1px solid var(--line); display: flex; flex-direction: column; min-height: 0; min-width: 0; }
  #right { background: var(--bg); display: flex; flex-direction: column; min-width: 0; min-height: 0; }

  /* ---------- Left ---------- */
  .side-head { padding: 14px 14px 12px; border-bottom: 1px solid var(--line-soft); }
  .brand-row { display: flex; align-items: center; justify-content: space-between; }
  .brand { font-weight: 700; font-size: 15px; letter-spacing: .02em; display: flex; align-items: center; gap: 7px; color: var(--ink); cursor: pointer; }
  .brand .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
  .icon-btn { border: 1px solid var(--line); background: var(--panel); color: var(--ink-soft); border-radius: 7px; padding: 2px 9px; font-size: 14px; line-height: 1.4; }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
  .vault-name { font-size: 11.5px; color: var(--ink-faint); margin-top: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .side-actions { display: flex; gap: 6px; margin-top: 12px; }
  .help-link { display: inline-block; margin-top: 10px; font-size: 11.5px; color: var(--ink-faint); text-decoration: none; }
  .help-link:hover { color: var(--accent); text-decoration: underline; }
  .welcome-help { display: inline-block; margin-top: 14px; font-size: 13px; color: var(--accent); text-decoration: none; }
  .welcome-help:hover { text-decoration: underline; }
  .btn { border: 1px solid var(--line); background: var(--panel); color: var(--ink-soft); border-radius: 7px; padding: 6px 10px; font-size: 12.5px; transition: .12s; white-space: nowrap; }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn.primary:hover { background: #266052; }
  .btn.full { flex: 1; text-align: center; }
  .search-wrap { padding: 10px 12px; border-bottom: 1px solid var(--line-soft); }
  #search { width: 100%; border: 1px solid var(--line); background: var(--bg); border-radius: 7px; padding: 7px 10px; font-size: 13px; font-family: inherit; color: var(--ink); outline: none; }
  #search:focus { border-color: var(--accent); background: #fff; }
  .tag-pane { flex: 1; overflow-y: auto; padding: 8px 8px 16px; min-height: 0; }
  .tag-pane .sec { font-size: 10.5px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: .08em; padding: 10px 10px 6px; font-weight: 600; }
  .tagrow { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 7px; font-size: 13px; color: var(--ink-soft); cursor: pointer; }
  .tagrow:hover { background: var(--line-soft); color: var(--ink); }
  .tagrow.on { background: var(--link-bg); color: var(--link); font-weight: 600; }
  .tagrow .nm { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tagrow .dotc { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .tagrow .n { margin-left: auto; font-size: 11px; color: var(--ink-faint); }
  .tagrow.on .n { color: var(--link); }
  .tag-empty { font-size: 12px; color: var(--ink-faint); padding: 8px 12px; }
  .tag-pane .sec-row { display: flex; align-items: center; justify-content: space-between; }
  .sec-cog { border: none; background: transparent; color: var(--ink-faint); font-size: 11px; cursor: pointer; padding: 2px 4px; letter-spacing: 0; text-transform: none; }
  .sec-cog:hover { color: var(--accent); }

  /* type-config modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(43,42,38,.35); display: none; align-items: center; justify-content: center; z-index: 100; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--panel); border-radius: 14px; box-shadow: 0 12px 48px rgba(0,0,0,.22); width: 430px; max-width: 92vw; max-height: 84vh; overflow-y: auto; padding: 20px 22px; }
  .modal-head { display: flex; align-items: center; justify-content: space-between; font-size: 16px; font-weight: 700; margin-bottom: 6px; }
  .modal-desc { font-size: 12px; color: var(--ink-soft); margin: 0 0 16px; line-height: 1.6; }
  .type-row { display: flex; align-items: center; gap: 10px; padding: 8px 2px; border-bottom: 1px solid var(--line-soft); }
  .type-row input[type=color] { width: 30px; height: 26px; border: 1px solid var(--line); border-radius: 6px; padding: 0; background: none; cursor: pointer; flex-shrink: 0; }
  .type-row .tn { flex: 1; font-size: 13.5px; font-weight: 600; color: var(--ink); min-width: 0; overflow: hidden; text-overflow: ellipsis; }
  .type-row .rm { border: none; background: transparent; color: var(--ink-faint); font-size: 17px; cursor: pointer; padding: 2px 7px; border-radius: 6px; line-height: 1; }
  .type-row .rm:hover { background: var(--line-soft); color: var(--link-empty); }
  .type-empty { font-size: 12.5px; color: var(--ink-faint); padding: 10px 2px; }
  .type-add { display: flex; gap: 8px; align-items: center; margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--line); }
  .type-add input[list] { flex: 1; min-width: 0; border: 1px solid var(--line); border-radius: 7px; padding: 7px 10px; font-size: 13px; font-family: inherit; outline: none; color: var(--ink); }
  .type-add input[list]:focus { border-color: var(--accent); }
  .type-add input[type=color] { width: 34px; height: 33px; border: 1px solid var(--line); border-radius: 7px; padding: 0; cursor: pointer; background: none; flex-shrink: 0; }

  /* ---------- Middle: near-square mini cards ---------- */
  .mid-head { height: 46px; flex-shrink: 0; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 8px; padding: 0 10px 0 14px; font-size: 12px; color: var(--ink-soft); background: var(--panel); }
  .mid-tabs { flex: 1; display: flex; gap: 4px; }
  .mid-tabs button { border: none; background: transparent; color: var(--ink-faint); font-family: inherit; font-size: 12px; font-weight: 600; padding: 5px 12px; border-radius: 7px; cursor: pointer; }
  .mid-tabs button:hover { background: var(--line-soft); color: var(--ink); }
  .mid-tabs button.on { background: var(--sel); color: var(--accent); }
  .mid-head-label { flex-shrink: 0; min-width: 0; display: flex; align-items: center; gap: 8px; padding: 9px 14px 2px; font-size: 12px; color: var(--ink-soft); }
  .mid-head-label b { color: var(--ink); font-weight: 600; font-size: 13px; }
  .mid-head-label .grow { flex: 1; }
  .card-list { flex: 1; overflow-y: auto; padding: 11px; min-height: 0; display: flex; flex-direction: column; gap: 10px; }
  .vcard { position: relative; flex-shrink: 0; height: 150px; background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 11px 12px 10px; cursor: pointer; overflow: hidden; box-shadow: var(--shadow); transition: transform .1s, border-color .1s, box-shadow .1s; display: flex; flex-direction: column; }
  .vcard::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--card-accent, var(--accent)); opacity: .85; }
  .vcard:hover { border-color: var(--card-accent, var(--accent)); transform: translateY(-1px); }
  .vcard.on { background: #fff; box-shadow: inset 0 0 0 1.5px var(--card-accent, var(--accent)), var(--shadow); border-color: transparent; }
  .vcard .vt { flex-shrink: 0; font-weight: 700; font-size: 13.5px; color: var(--ink); line-height: 1.4; margin-bottom: 5px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .vcard .vp { flex: 1 1 auto; min-height: 0; font-size: 11px; line-height: 1.55; color: var(--ink-soft); white-space: pre-wrap; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .vcard .vp.empty { color: var(--ink-faint); font-style: italic; }
  .vcard .vtags { flex-shrink: 0; display: flex; flex-wrap: nowrap; gap: 4px; margin-top: 6px; overflow: hidden; }
  .vcard .vtags .t { flex-shrink: 0; font-size: 9.5px; color: var(--link); background: var(--link-bg); border-radius: 9px; padding: 1px 6px; cursor: pointer; white-space: nowrap; }
  .vcard .vtags .t:hover { background: var(--sel); }
  .vcard .vfoot { flex-shrink: 0; display: flex; gap: 8px; margin-top: 6px; font-size: 9.5px; color: var(--ink-faint); }
  .vcard .vfoot .date { margin-right: auto; }
  .mid-empty { font-size: 13px; color: var(--ink-faint); padding: 24px 6px; text-align: center; }
  .mid-newcard { flex-shrink: 0; border: 1px dashed var(--line); border-radius: 10px; padding: 11px; text-align: center; font-size: 12.5px; color: var(--ink-faint); cursor: pointer; }
  .mid-newcard:hover { border-color: var(--accent); color: var(--accent); }
  .mid-hint { flex-shrink: 0; font-size: 10.5px; color: var(--ink-faint); padding: 2px 4px 4px; text-align: center; }
  .cal-view { flex: 1; overflow-y: auto; padding: 12px 12px 16px; min-height: 0; }
  .cal-head { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
  .cal-title { font-size: 14px; font-weight: 700; color: var(--ink); }
  .cal-nav { border: 1px solid var(--line); background: var(--panel); color: var(--ink-soft); width: 26px; height: 26px; border-radius: 7px; cursor: pointer; font-size: 15px; line-height: 1; }
  .cal-nav:hover { border-color: var(--accent); color: var(--accent); }
  .cal-head .grow { flex: 1; }
  .cal-today { border: 1px solid var(--line); background: var(--panel); color: var(--accent); font-family: inherit; font-size: 11.5px; font-weight: 600; padding: 5px 10px; border-radius: 7px; cursor: pointer; }
  .cal-today:hover { background: var(--sel); border-color: var(--accent); }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .cal-week { margin-bottom: 3px; }
  .cal-wd { text-align: center; font-size: 10.5px; color: var(--ink-faint); padding: 2px 0; }
  .cal-wd.sun { color: #b0673e; } .cal-wd.sat { color: #3e6fb0; }
  .cal-cell { position: relative; aspect-ratio: 1 / 1; border: 1px solid transparent; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; cursor: pointer; background: var(--panel); }
  .cal-cell.empty { background: transparent; cursor: default; }
  .cal-cell:not(.empty):hover { border-color: var(--line); background: var(--line-soft); }
  .cal-d { font-size: 12px; color: var(--ink); }
  .cal-cell.sun .cal-d { color: #b0673e; } .cal-cell.sat .cal-d { color: #3e6fb0; }
  .cal-cell.has { background: var(--sel); }
  .cal-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); position: absolute; bottom: 5px; }
  .cal-cell.today { border-color: var(--accent); }
  .cal-cell.today .cal-d { font-weight: 800; color: var(--accent); }
  .cal-cell.on { outline: 2px solid var(--accent); outline-offset: -1px; }

  /* ---------- Right: topbar + split panels ---------- */
  .topbar { height: 46px; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 12px; padding: 0 16px; background: var(--panel); flex-shrink: 0; }
  #showLeftBtn { display: none; }
  #app.left-collapsed #showLeftBtn { display: inline-flex; }
  #showMidBtn { display: none; }
  #app.mid-collapsed #showMidBtn { display: inline-flex; }
  .crumb { font-size: 13px; font-weight: 400; color: var(--ink-soft); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .top-spacer { flex: 1; }
  .mode-toggle { display: flex; border: 1px solid var(--line); border-radius: 7px; overflow: hidden; }
  .mode-toggle button { border: none; background: var(--panel); color: var(--ink-soft); padding: 5px 13px; font-size: 12.5px; }
  .mode-toggle button.on { background: var(--accent); color: #fff; }
  .save-state { font-size: 11.5px; color: var(--ink-faint); min-width: 56px; }
  .save-state.dirty { color: var(--link-empty); }

  .panes { flex: 1; display: flex; min-height: 0; }
  .panel { flex: 1 1 0; min-width: 0; display: flex; flex-direction: column; min-height: 0; }
  .panel + .panel { border-left: 1px solid var(--line); }
  .card-head { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 18px; }
  .card-title { flex: 1; font-size: 22px; font-weight: 700; color: var(--ink); line-height: 1.3; word-break: break-word; }
  .panes.split .card-head { margin-bottom: 14px; }
  .panes.split .card-title { font-size: 18px; }
  .panel-close { flex-shrink: 0; border: none; background: transparent; color: var(--ink-faint); font-size: 18px; line-height: 1; padding: 2px 7px; border-radius: 6px; }
  .panel-close:hover { background: var(--line-soft); color: var(--ink); }
  .panel-del { flex-shrink: 0; border: none; background: transparent; color: var(--ink-faint); font-size: 14px; line-height: 1; padding: 3px 7px; border-radius: 6px; }
  .panel-del:hover { background: #f6eae3; color: var(--link-empty); }
  .panel-ren { flex-shrink: 0; border: none; background: transparent; color: var(--ink-faint); font-size: 14px; line-height: 1; padding: 3px 7px; border-radius: 6px; }
  .panel-ren:hover { background: var(--line-soft); color: var(--accent); }
  .panel-img { flex-shrink: 0; border: none; background: transparent; font-size: 14px; line-height: 1; padding: 3px 7px; border-radius: 6px; cursor: pointer; }
  .panel-img:hover { background: var(--line-soft); }
  .src-editor.drag-over { outline: 2px dashed var(--accent); outline-offset: 2px; background: var(--sel); }
  .title-edit { flex: 1; font-size: 22px; font-weight: 700; color: var(--ink); font-family: inherit; line-height: 1.3; border: none; border-bottom: 2px solid var(--accent); background: transparent; outline: none; padding: 0 0 2px; }
  .panes.split .title-edit { font-size: 18px; }
  .folder-row { display: flex; align-items: center; gap: 10px; margin: 4px 0 14px; }
  .folder-cur { flex: 1; font-size: 13px; color: var(--ink); background: var(--line-soft); border: 1px solid var(--line); border-radius: 7px; padding: 7px 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .attach-row { display: flex; flex-direction: column; gap: 5px; margin: 4px 0 14px; }
  .attach-row label { font-size: 12px; color: var(--ink-soft); }
  .attach-row input { border: 1px solid var(--line); border-radius: 7px; padding: 7px 10px; font-size: 13px; font-family: inherit; outline: none; color: var(--ink); }
  .attach-row input:focus { border-color: var(--accent); }
  .modal-sub { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--ink-faint); font-weight: 600; margin: 6px 0 4px; }
  .panel-scroll { flex: 1; overflow-y: auto; min-height: 0; }
  .notewrap { max-width: 820px; margin: 0 auto; padding: 26px 28px 10px; }
  .notecard { background: var(--panel); border: 1px solid var(--line); border-radius: 16px; box-shadow: var(--shadow); padding: 34px 40px; }
  .panes.split .notewrap { max-width: none; padding: 12px 10px 10px; }
  .panes.split .notecard { padding: 22px 22px; }
  .panes.split .backlinks { max-width: none; padding: 4px 12px 60px; }
  .doc { padding: 0; }

  /* full-document source editor — typography matched to read mode to minimize the jump on toggle */
  .src-editor { display: block; width: 100%; min-height: 60vh; border: none; outline: none; resize: none; font-family: var(--sans); font-size: 15.5px; line-height: 1.85; background: transparent; color: var(--ink); padding: 0; overflow: hidden; white-space: pre-wrap; word-break: break-word; }
  .panes.split .src-editor { font-size: 14.5px; }

  /* read-mode rendered markdown */
  .md-rendered { font-size: 15.5px; line-height: 1.85; color: var(--ink); cursor: text; overflow-wrap: anywhere; word-break: break-word; }
  .panes.split .md-rendered { font-size: 14.5px; }
  .md-rendered > *:first-child { margin-top: 0; }
  .md-rendered > *:last-child { margin-bottom: 0; }
  .md-rendered h1 { font-size: 25px; font-weight: 700; line-height: 1.35; margin: 1.3em 0 .5em; }
  .md-rendered h2 { font-size: 20px; font-weight: 700; line-height: 1.35; margin: 1.25em 0 .45em; }
  .md-rendered h3 { font-size: 17px; font-weight: 700; margin: 1.15em 0 .4em; }
  .md-rendered h4 { font-size: 15px; font-weight: 700; margin: 1.1em 0 .3em; }
  .md-rendered h5, .md-rendered h6 { font-size: 13px; font-weight: 700; color: var(--ink-soft); margin: 1em 0 .3em; letter-spacing: .02em; }
  .md-rendered p { margin: .7em 0; }
  .md-rendered ul, .md-rendered ol { margin: .5em 0; padding-left: 1.6em; }
  .md-rendered li { margin: .2em 0; }
  .md-rendered blockquote { border-left: 3px solid var(--line); margin: .8em 0; padding: .15em 0 .15em 14px; color: var(--ink-soft); }
  .md-rendered pre.code-block { background: var(--line-soft); border: 1px solid var(--line); border-radius: 8px; padding: 12px 14px; overflow-x: auto; margin: .8em 0; }
  .md-rendered pre.code-block code { font-family: var(--mono); font-size: 13px; color: var(--ink); background: none; padding: 0; }
  .md-rendered code { font-family: var(--mono); font-size: 13.5px; background: var(--line-soft); padding: 1px 5px; border-radius: 4px; color: #b04a6a; }
  .md-rendered hr { border: none; border-top: 1px solid var(--line); margin: 1.4em 0; }
  .md-rendered table { border-collapse: collapse; margin: .8em 0; font-size: 13.5px; display: block; overflow-x: auto; }
  .md-rendered th, .md-rendered td { border: 1px solid var(--line); padding: 5px 11px; text-align: left; }
  .md-rendered th { background: var(--line-soft); font-weight: 700; }
  .md-rendered img.md-img { max-width: 100%; border-radius: 8px; margin: .5em 0; }
  .md-rendered .img-missing { display: inline-block; font-size: 12px; color: var(--ink-faint); background: var(--line-soft); border: 1px dashed var(--line); border-radius: 6px; padding: 2px 8px; }
  .md-rendered strong { font-weight: 700; }
  .md-rendered em { font-style: italic; }
  .md-rendered del { text-decoration: line-through; color: var(--ink-faint); }
  .md-rendered a.ext { color: var(--link); text-decoration: underline; text-underline-offset: 2px; overflow-wrap: anywhere; word-break: break-word; }
  .md-rendered .tag { color: var(--link); cursor: pointer; }
  .md-rendered .tag:hover { text-decoration: underline; }
  .wikilink { color: var(--link); background: var(--link-bg); padding: 1px 6px; border-radius: 5px; cursor: pointer; text-decoration: none; font-weight: 500; white-space: nowrap; }
  .wikilink:hover { background: var(--sel); }
  .wikilink.empty { color: var(--link-empty); background: #f6eae3; }
  .wikilink.empty:hover { background: #efdccf; }

  .backlinks { max-width: 820px; margin: 0 auto; padding: 4px 28px 70px; }
  .bl-head { font-size: 11.5px; text-transform: uppercase; letter-spacing: .08em; color: var(--ink-faint); font-weight: 600; padding-top: 22px; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .bl-head .count { background: var(--link-bg); color: var(--link); border-radius: 20px; padding: 1px 9px; font-size: 11px; letter-spacing: 0; }
  .bl-card { border: 1px solid var(--line); border-radius: 10px; padding: 13px 16px; margin-bottom: 10px; background: var(--panel); cursor: pointer; transition: .12s; box-shadow: var(--shadow); }
  .bl-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .bl-card .title { font-weight: 600; font-size: 14px; color: var(--link); margin-bottom: 5px; }
  .bl-card .ctx { font-size: 12.5px; color: var(--ink-soft); line-height: 1.6; }
  .bl-card .ctx mark { background: var(--sel); color: var(--ink); padding: 0 2px; border-radius: 3px; }
  .bl-empty { font-size: 13px; color: var(--ink-faint); }

  /* single-pane: links beside the note card */
  .note-layout { display: flex; align-items: flex-start; gap: 22px; max-width: 1180px; margin: 0 auto; padding: 26px 28px 50px; }
  .note-main { flex: 1 1 auto; min-width: 0; }
  .note-main .notewrap { max-width: none; margin: 0; padding: 0; }
  .note-side { flex: 0 0 288px; position: sticky; top: 26px; align-self: flex-start; max-height: calc(100vh - 96px); overflow-y: auto; }
  .toc { margin-bottom: 22px; }
  .toc .bl-head { padding-top: 2px; }
  .toc-list { margin-top: 2px; }
  .toc-item { font-size: 12px; line-height: 1.5; color: var(--ink-soft); cursor: pointer; padding: 3px 8px; border-radius: 6px; border-left: 2px solid transparent; overflow-wrap: anywhere; word-break: break-word; }
  .toc-item:hover { background: var(--line-soft); color: var(--ink); border-left-color: var(--accent); }
  .toc-item.lv1 { font-weight: 700; color: var(--ink); }
  .toc-item.lv2 { padding-left: 18px; }
  .toc-item.lv3 { padding-left: 30px; }
  .toc-item.lv4 { padding-left: 42px; }
  .toc-item.lv5, .toc-item.lv6 { padding-left: 54px; font-size: 11px; }
  .panel { container-type: inline-size; }

  /* link block + near-square backlink cards */
  .linkblock.below { max-width: none; padding: 6px 12px 60px; }
  .linkblock .bl-head { padding-top: 14px; }
  .linkblock.side .bl-head:first-child { padding-top: 2px; }
  .bl-grid { display: grid; gap: 10px; margin-top: 2px; }
  .linkblock.side .bl-grid { grid-template-columns: repeat(auto-fill, minmax(122px, 1fr)); }
  .linkblock.below .bl-grid { grid-template-columns: repeat(auto-fill, minmax(152px, 1fr)); }
  .blcard { position: relative; height: 126px; display: flex; flex-direction: column; background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 10px 11px; cursor: pointer; overflow: hidden; box-shadow: var(--shadow); transition: transform .1s, border-color .1s; }
  .blcard::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--card-accent, var(--accent)); opacity: .85; }
  .blcard:hover { border-color: var(--card-accent, var(--accent)); transform: translateY(-1px); }
  .blcard .bt { flex-shrink: 0; font-weight: 700; font-size: 12.5px; color: var(--link); line-height: 1.35; margin-bottom: 5px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .blcard .bc { flex: 1 1 auto; min-height: 0; font-size: 10.5px; line-height: 1.5; color: var(--ink-soft); display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
  .blcard .bc mark { background: var(--sel); color: var(--ink); padding: 0 2px; border-radius: 3px; }
  @container (max-width: 700px) { .note-layout { flex-direction: column; } .note-side { flex-basis: auto; width: 100%; } }
  .twohop-group { margin-bottom: 18px; }
  .twohop-via { font-size: 12px; color: var(--ink-soft); margin-bottom: 8px; }
  .twohop-via b { color: var(--link); }
  .twohop-chips { display: flex; flex-wrap: wrap; gap: 7px; }
  .chip { border: 1px solid var(--line); background: var(--panel); border-radius: 18px; padding: 4px 12px; font-size: 12.5px; color: var(--ink-soft); cursor: pointer; }
  .chip:hover { border-color: var(--accent); color: var(--link); }
  .chip.empty { color: var(--link-empty); border-style: dashed; }

  .welcome { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 16px; padding: 40px; }
  .welcome h1 { font-size: 26px; margin: 0; font-weight: 700; }
  .welcome p { color: var(--ink-soft); max-width: 440px; margin: 0; line-height: 1.7; }
  .welcome .glyph { width: 60px; height: 60px; border-radius: 16px; background: var(--accent); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 30px; font-weight: 700; box-shadow: 0 6px 24px rgba(47,111,94,.3); }
  .hint { font-size: 12px; color: var(--ink-faint); }
  .hint code { font-family: var(--mono); background: var(--line-soft); padding: 1px 5px; border-radius: 4px; }
  .right-empty { height: 100%; display: flex; align-items: center; justify-content: center; color: var(--ink-faint); font-size: 13.5px; }

  #ac { position: absolute; z-index: 50; background: var(--panel); border: 1px solid var(--line); border-radius: 9px; box-shadow: var(--shadow); min-width: 200px; max-height: 220px; overflow-y: auto; display: none; padding: 4px; }
  #ac .ac-item { padding: 6px 10px; border-radius: 6px; font-size: 13px; color: var(--ink-soft); cursor: pointer; }
  #ac .ac-item.sel, #ac .ac-item:hover { background: var(--link-bg); color: var(--link); }
  #ac .ac-item.new { color: var(--link-empty); }

  .panel-scroll::-webkit-scrollbar, .card-list::-webkit-scrollbar, .tag-pane::-webkit-scrollbar { width: 9px; }
  .panel-scroll::-webkit-scrollbar-thumb { background: var(--line); border-radius: 6px; border: 2px solid var(--bg); }
  .card-list::-webkit-scrollbar-thumb { background: var(--line); border-radius: 6px; border: 2px solid var(--bg); }
  .tag-pane::-webkit-scrollbar-thumb { background: var(--line); border-radius: 6px; border: 2px solid var(--panel); }

  @media (max-width: 1040px) { #app { grid-template-columns: 228px 1fr; } #app:not(.left-collapsed) #left { display: none; } }
  @media (max-width: 720px)  { #app, #app.left-collapsed { grid-template-columns: 1fr; } #mid { display: none; } }
</style>
</head>
<body>
<div id="app">
  <aside id="left">
    <div class="side-head">
      <div class="brand-row">
        <div class="brand" id="brand"><span class="dot"></span>mdNotes</div>
        <button class="icon-btn" id="collapseLeftBtn" title="サイドバーを隠す">‹</button>
      </div>
      <div class="vault-name" id="vaultName">フォルダ未選択</div>
      <div class="side-actions">
        <button class="btn full" id="settingsBtn">⚙ 設定</button>
        <button class="btn" id="newBtn" title="新規ノート">＋</button>
      </div>
      <a class="help-link" href="guide.html" target="_blank" rel="noopener">使い方・更新履歴 ↗</a>
    </div>
    <div class="search-wrap">
      <input id="search" placeholder="検索… (⌘K)" autocomplete="off">
    </div>
    <div class="tag-pane" id="tagList"></div>
  </aside>

  <section id="mid">
    <div class="mid-head">
      <div class="mid-tabs">
        <button id="tabList" class="on">一覧</button>
        <button id="tabCal">カレンダー</button>
      </div>
      <button class="icon-btn" id="collapseMidBtn" title="カード一覧を隠す">‹</button>
    </div>
    <div class="mid-head-label" id="midHead"></div>
    <div class="card-list" id="cardList"></div>
    <div class="cal-view" id="calView" style="display:none"></div>
    <div class="mid-hint" id="midHint"></div>
  </section>

  <main id="right">
    <div class="topbar">
      <button class="icon-btn" id="showLeftBtn" title="サイドバーを表示">≡</button>
      <button class="icon-btn" id="showMidBtn" title="カード一覧を表示">▦</button>
      <div class="mode-toggle">
        <button id="readBtn" class="on">読む</button>
        <button id="editBtn">編集</button>
      </div>
      <div class="crumb" id="crumb"></div>
      <div class="top-spacer"></div>
      <button class="icon-btn" id="addPaneBtn" title="新規ノートを隣に開く">＋ノート</button>
      <div class="save-state" id="saveState"></div>
    </div>
    <div class="panes" id="panes">
      <div class="welcome" id="welcome">
        <div class="glyph">md</div>
        <h1>ローカルのMarkdownを開く</h1>
        <p>フォルダを選ぶと中の <code>.md</code> をその場で読み書きできます。<br>
           カードを ⌘ / Ctrl クリックすると、右に2枚（最大3枚）並べて表示できます。</p>
        <button class="btn primary" id="openBtn2">フォルダを開く</button>
        <div id="reopenWrap" style="display:none; margin-top:4px;"></div>
        <div class="hint">Chrome / Edge / Arc（Mac）で動作。ファイルはこの端末から外に出ません。</div>
        <a class="welcome-help" href="guide.html" target="_blank" rel="noopener">使い方・更新履歴を見る ↗</a>
      </div>
    </div>
  </main>
</div>
<div id="ac"></div>

<div id="typeModal" class="modal-overlay">
  <div class="modal">
    <div class="modal-head">設定 <button class="icon-btn" id="typeClose" title="閉じる">×</button></div>
    <div class="modal-sub">フォルダ</div>
    <div class="folder-row">
      <div class="folder-cur" id="modalVault">フォルダ未選択</div>
      <button class="btn primary" id="openBtnModal">フォルダを開く</button>
    </div>
    <div class="modal-sub">画像</div>
    <div class="attach-row">
      <label for="attachDirInput">画像の保存先フォルダ（vault内）</label>
      <input id="attachDirInput" placeholder="attachments" autocomplete="off">
    </div>
    <div class="modal-sub">タイプタグ</div>
    <p class="modal-desc">タグを「タイプ」に指定すると、ミニカードやドットの色を固定でき、タグペインの上部にまとまります。</p>
    <div id="typeList"></div>
    <div class="type-add">
      <input id="typeAddInput" list="tagDatalist" placeholder="タグ名（# は不要）" autocomplete="off">
      <datalist id="tagDatalist"></datalist>
      <input id="typeAddColor" type="color" value="#2f6f5e" title="色">
      <button class="btn primary" id="typeAddBtn">追加</button>
    </div>
  </div>
</div>

<script>
"use strict";

/* ===================== State ===================== */
const S = {
  dirHandle: null,
  files: new Map(),     // name -> {handle, name, fullName, body, mtime, loaded, virtual, dirty}
  open: [],             // names shown in right pane (1..MAX_PANES)
  tags: new Set(),      // active tag filters (AND)
  types: [],            // [{tag, color}] configured "type" tags
  attachDir: "attachments", // subfolder for pasted images
  mode: "read",
  midView: "list",      // "list" | "calendar"
  calMonth: null,       // Date (1st of displayed month) for the calendar
  timers: new Map(),    // name -> save timer
};
const MAX_PANES = 3;

const $ = s => document.querySelector(s);
const el = (t, c, txt) => { const e = document.createElement(t); if (c) e.className = c; if (txt != null) e.textContent = txt; return e; };

/* ===================== Folder access ===================== */
async function openFolder() {
  if (!window.showDirectoryPicker) {
    alert("このブラウザはフォルダアクセス（File System Access API）に未対応です。MacのChrome / Edge / Arc をお使いください。");
    return;
  }
  try {
    const handle = await window.showDirectoryPicker({ mode: "readwrite" });
    S.dirHandle = handle;
    try { await idbSet("dir", handle); } catch (e) {}
    await scanFolder();
  } catch (e) { if (e.name !== "AbortError") console.error(e); }
}

async function scanFolder() {
  S.files.clear(); S.open = []; S.tags = new Set();
  for await (const entry of S.dirHandle.values()) {
    if (entry.kind === "file" && entry.name.toLowerCase().endsWith(".md")) {
      const base = entry.name.replace(/\.md$/i, "");
      S.files.set(base, { handle: entry, name: base, fullName: entry.name, body: "", loaded: false, mtime: 0 });
    }
  }
  for (const f of S.files.values()) await loadBody(f);
  await loadTypes();
  $("#vaultName").textContent = S.dirHandle.name + " · " + S.files.size + "件";
  renderLeft(); renderMid();
  const first = [...S.files.values()].filter(f => !f.virtual).sort((a,b) => b.mtime - a.mtime)[0];
  if (first) openNote(first.name); else showRightEmpty("ノートがありません。＋ で新規作成できます。");
}

async function loadBody(f) {
  if (f.loaded) return f;
  try { const file = await f.handle.getFile(); f.body = await file.text(); f.mtime = file.lastModified; f.loaded = true; }
  catch (e) { f.body = ""; f.loaded = true; }
  return f;
}

function fileFor(name) {
  let f = S.files.get(name);
  if (!f) { f = { handle: null, name, fullName: name + ".md", body: "", loaded: true, mtime: Date.now(), virtual: true }; S.files.set(name, f); }
  return f;
}

/* ===================== Tags ===================== */
const TAG_CH = "0-9A-Za-z_\\u00C0-\\u024F\\u3040-\\u30FF\\u3400-\\u9FFF\\uF900-\\uFAFF\\u4E00-\\u9FFF々ー\\-";
const TAG_RE = new RegExp("(^|[\\s(])[#＃]([" + TAG_CH + "]+)", "g");
function tagsIn(body){ const out = new Set(); let m; TAG_RE.lastIndex = 0; while ((m = TAG_RE.exec(body || ""))) out.add(m[2]); return out; }

/* ===================== Card helpers ===================== */
const NO_TAG_COLOR = "#c2bdb2";
function accentFor(f){
  for (const t of tagsIn(f.body)) { const ty = S.types.find(x => x.tag === t); if (ty) return ty.color; }
  return NO_TAG_COLOR;
}

/* Type-tag config persistence: stored in the vault as mdnotes.config.json,
   with localStorage kept as a cache and one-time migration source. */
const CONFIG_NAME = "mdnotes.config.json";
function typesKey(){ return "mdnotes.types:" + (S.dirHandle ? S.dirHandle.name : "_"); }
async function loadTypes(){
  S.types = []; S.attachDir = "attachments";
  if (!S.dirHandle) return;
  // Read the config file in the folder (if any).
  let configTypes = null;
  try {
    const fh = await S.dirHandle.getFileHandle(CONFIG_NAME);
    const j = JSON.parse(await (await fh.getFile()).text());
    if (j && Array.isArray(j.types)) configTypes = j.types.filter(x => x && x.tag && x.color);
    if (j && typeof j.attachDir === "string" && j.attachDir.trim()) S.attachDir = j.attachDir.trim();
  } catch (e) { /* no config file yet */ }
  // If the folder config already has types, use them.
  if (configTypes && configTypes.length) { S.types = configTypes; return; }
  // Otherwise fall back to the localStorage cache, and persist it into the folder
  // so the setting travels with the vault (and syncs to other devices).
  try {
    const raw = localStorage.getItem(typesKey());
    if (raw) {
      const arr = JSON.parse(raw);
      if (Array.isArray(arr)) {
        const ls = arr.filter(x => x && x.tag && x.color);
        if (ls.length) { S.types = ls; saveTypes(); return; }
      }
    }
  } catch (e) {}
  if (configTypes) S.types = configTypes; // keep (possibly empty) config value
}
let _cfgTimer = null;
function saveTypes(){
  try { localStorage.setItem(typesKey(), JSON.stringify(S.types)); } catch (e) {}
  if (!S.dirHandle) return;
  clearTimeout(_cfgTimer);
  _cfgTimer = setTimeout(async () => {
    try {
      const fh = await S.dirHandle.getFileHandle(CONFIG_NAME, { create: true });
      const w = await fh.createWritable(); await w.write(JSON.stringify({ types: S.types, attachDir: S.attachDir }, null, 2)); await w.close();
    } catch (e) { console.error(e); }
  }, 300);
}
function previewText(body, name){
  let lines = (body || "").split("\n");
  if (lines[0] && lines[0].replace(/^#{1,6}\s+/,"").trim() === name) lines = lines.slice(1);
  return lines.map(l => l
      .replace(/^#{1,6}\s+/,"").replace(/^>\s?/,"").replace(/^(\s*)[-*]\s+/,"$1• ")
      .replace(/\[\[([^\]]+)\]\]/g,"$1").replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,"$1")
      .replace(/`([^`]+)`/g,"$1").replace(/\*\*([^*]+)\*\*/g,"$1").replace(/(^|[^*])\*([^*]+)\*/g,"$1$2"))
    .filter(l => l.trim() !== "").join("\n");
}
function linksIn(body){ const out = new Set(); const re = /\[\[([^\]]+)\]\]/g; let m; while ((m = re.exec(body))) out.add(m[1].trim()); return out; }
function backlinkMap(){ const m = new Map(); for (const f of S.files.values()) for (const t of linksIn(f.body)) m.set(t, (m.get(t)||0) + 1); return m; }

/* ===================== Left pane: tags ===================== */
function renderLeft(){
  const pane = $("#tagList"); pane.innerHTML = "";
  if (!S.dirHandle) return;
  const tagCounts = new Map();
  for (const f of S.files.values()) { if (f.virtual) continue; for (const t of tagsIn(f.body)) tagCounts.set(t, (tagCounts.get(t)||0) + 1); }
  for (const t of [...S.tags]) if (!tagCounts.has(t)) S.tags.delete(t);

  pane.appendChild(el("div", "sec", "フィルタ"));
  const total = [...S.files.values()].filter(f => !f.virtual).length;
  const allRow = el("div", "tagrow" + (S.tags.size ? "" : " on"));
  allRow.innerHTML = '<span class="nm">すべてのノート</span><span class="n">' + total + '</span>';
  allRow.onclick = () => { S.tags.clear(); refresh(); };
  pane.appendChild(allRow);

  const mkRow = (t, c, color) => {
    const row = el("div", "tagrow" + (S.tags.has(t) ? " on" : ""));
    const dot = color ? '<span class="dotc" style="background:' + color + '"></span>' : '';
    row.innerHTML = dot + '<span class="nm">#' + esc(t) + '</span><span class="n">' + c + '</span>';
    row.onclick = () => { if (S.tags.has(t)) S.tags.delete(t); else S.tags.add(t); refresh(); };
    return row;
  };
  const secRow = (label) => {
    const sh = el("div", "sec sec-row");
    sh.appendChild(el("span", null, label));
    return sh;
  };

  const typeTags = S.types.filter(ty => tagCounts.has(ty.tag));
  if (typeTags.length) {
    pane.appendChild(secRow("タイプ"));
    for (const ty of typeTags) pane.appendChild(mkRow(ty.tag, tagCounts.get(ty.tag), ty.color));
  }

  const typeSet = new Set(S.types.map(x => x.tag));
  const others = [...tagCounts.entries()].filter(([t]) => !typeSet.has(t)).sort((a,b) => b[1]-a[1] || a[0].localeCompare(b[0]));
  pane.appendChild(secRow("タグ"));
  if (!others.length) { pane.appendChild(el("div", "tag-empty", typeTags.length ? "他のタグはありません" : "本文に #タグ を書くとここに出ます")); return; }
  for (const [t,c] of others) pane.appendChild(mkRow(t, c));
}

/* ===================== Middle pane: cards ===================== */
/* ===================== Daily notes ===================== */
const DAILY_RE = /^\d{4}-\d{2}-\d{2}$/;
function isDaily(name){ return DAILY_RE.test(name); }
function ymd(d){ return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0"); }

function filteredItems(){
  const q = $("#search").value.trim().toLowerCase();
  let items = [...S.files.values()].filter(f => !f.virtual && !isDaily(f.name));
  if (q) items = items.filter(f => f.name.toLowerCase().includes(q) || f.body.toLowerCase().includes(q));
  if (S.tags.size) { const sel = [...S.tags]; items = items.filter(f => { const ft = tagsIn(f.body); return sel.every(t => ft.has(t)); }); }
  items.sort((a,b) => b.mtime - a.mtime);
  return items;
}
function buildVCard(f, blm){
  const card = el("div", "vcard" + (S.open.includes(f.name) ? " on" : ""));
  card.dataset.name = f.name;
  card.style.setProperty("--card-accent", accentFor(f));
  card.appendChild(el("div", "vt", f.name));
  const pv = previewText(f.body, f.name);
  const prev = el("div", "vp" + (pv ? "" : " empty")); prev.textContent = pv || "（本文なし）"; card.appendChild(prev);
  const ftags = [...tagsIn(f.body)];
  if (ftags.length) {
    const tw = el("div", "vtags");
    ftags.slice(0, 4).forEach(t => { const ch = el("span", "t", "#" + t); ch.onclick = (e) => { e.stopPropagation(); S.tags = new Set([t]); refresh(); }; tw.appendChild(ch); });
    card.appendChild(tw);
  }
  const foot = el("div", "vfoot"); const d = new Date(f.mtime);
  foot.appendChild(el("span", "date", isNaN(d) ? "" : `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`));
  const out = linksIn(f.body).size, back = blm.get(f.name) || 0;
  if (out)  { const s = el("span"); s.textContent = "→ " + out; foot.appendChild(s); }
  if (back) { const s = el("span"); s.textContent = "⤺ " + back; foot.appendChild(s); }
  card.appendChild(foot);
  card.onclick = (e) => openNote(f.name, e.metaKey || e.ctrlKey || e.shiftKey);
  return card;
}
function renderMid(){
  const head = $("#midHead"), list = $("#cardList"), hint = $("#midHint"), cal = $("#calView");
  $("#tabList").classList.toggle("on", S.midView === "list");
  $("#tabCal").classList.toggle("on", S.midView === "calendar");
  list.innerHTML = "";
  if (!S.dirHandle) { head.textContent = ""; hint.textContent = ""; cal.style.display = "none"; head.style.display = "none"; list.style.display = "none"; return; }
  if (S.midView === "calendar") {
    list.style.display = "none"; head.style.display = "none"; cal.style.display = "";
    renderCalendar();
    hint.textContent = "クリックで開く・⌘/Ctrlで並べて表示";
    return;
  }
  cal.style.display = "none"; list.style.display = ""; head.style.display = "";
  const q = $("#search").value.trim();
  const items = filteredItems();
  const sel = [...S.tags];
  const label = sel.length ? sel.map(t => '#' + esc(t)).join(' ') : (q ? "検索結果" : "すべてのノート");
  head.innerHTML = '<b>' + label + '</b><span class="grow"></span><span>' + items.length + '件</span>';
  const blm = backlinkMap();
  if (!items.length) list.appendChild(el("div", "mid-empty", (q || sel.length) ? "一致するノートがありません" : "ノートがありません"));
  else for (const f of items) list.appendChild(buildVCard(f, blm));
  if (!q && !sel.length) { const nc = el("div", "mid-newcard", "＋ 新規ノート"); nc.onclick = newNote; list.appendChild(nc); }
  hint.textContent = "⌘/Ctrlクリックで並べて表示";
}
function renderCalendar(){
  const box = $("#calView"); box.innerHTML = "";
  if (!S.calMonth) { const t = new Date(); S.calMonth = new Date(t.getFullYear(), t.getMonth(), 1); }
  const year = S.calMonth.getFullYear(), month = S.calMonth.getMonth();

  const head = el("div", "cal-head");
  const prev = el("button", "cal-nav", "‹"); prev.title = "前の月"; prev.onclick = () => { S.calMonth = new Date(year, month - 1, 1); renderCalendar(); };
  const next = el("button", "cal-nav", "›"); next.title = "次の月"; next.onclick = () => { S.calMonth = new Date(year, month + 1, 1); renderCalendar(); };
  const title = el("div", "cal-title", year + "年 " + (month + 1) + "月");
  const write = el("button", "cal-today", "今日を書く");
  write.onclick = (e) => { const t = new Date(); S.calMonth = new Date(t.getFullYear(), t.getMonth(), 1); openNote(ymd(t), e.metaKey || e.ctrlKey || e.shiftKey); };
  head.appendChild(prev); head.appendChild(title); head.appendChild(next);
  head.appendChild(el("span", "grow")); head.appendChild(write);
  box.appendChild(head);

  const wk = el("div", "cal-grid cal-week");

/* Note body: a full-document textarea in edit mode, rendered markdown in read mode. */
function buildBody(f){
  if (S.mode === "edit") {
    const ta = el("textarea", "src-editor"); ta.value = f.body; ta.spellcheck = false;
    ta.addEventListener("input", () => { autoGrow(ta); handleAutocomplete(ta); markBody(ta); });
    ta.addEventListener("keydown", (e) => {
      if (acState.open && ["ArrowDown","ArrowUp","Enter","Tab","Escape"].includes(e.key)) { acKey(e); return; }
      if (e.key === "Tab" && !e.isComposing) { handleTabIndent(e, ta); return; }
      if (e.isComposing || e.keyCode === 229) return;
    });
    ta.addEventListener("blur", () => setTimeout(hideAC, 120));
    ta.addEventListener("paste", (e) => handlePaste(e, ta));
    ta.addEventListener("dragover", (e) => { if (e.dataTransfer && [...e.dataTransfer.items].some(it => it.kind === "file")) { e.preventDefault(); ta.classList.add("drag-over"); } });
    ta.addEventListener("dragleave", () => ta.classList.remove("drag-over"));
    ta.addEventListener("drop", (e) => handleDrop(e, ta));
    requestAnimationFrame(() => autoGrow(ta));
    return ta;
  }
  const div = el("div", "md-rendered");
  div.innerHTML = renderMarkdown(f.body);
  div.addEventListener("click", (e) => {
    if (e.target.closest(".wikilink") || e.target.closest("a.ext") || e.target.closest(".tag") || e.target.closest("img")) return;
    if (window.getSelection && String(window.getSelection())) return;
    setMode("edit");
  });
  resolveLocalImages(div);
  return div;
}
function autoGrow(ta){
  const scroller = ta.closest(".panel-scroll");
  const prev = scroller ? scroller.scrollTop : 0;
  ta.style.height = "auto";
  ta.style.height = (ta.scrollHeight + 2) + "px";
  if (scroller) scroller.scrollTop = prev;
}

/* ===================== Images (paste → attachments folder) ===================== */
function tstamp(){ const d = new Date(); const p = n => String(n).padStart(2,"0"); return "" + d.getFullYear() + p(d.getMonth()+1) + p(d.getDate()) + "-" + p(d.getHours()) + p(d.getMinutes()) + p(d.getSeconds()); }
function insertAtCaret(ta, text){
  const s = ta.selectionStart, e = ta.selectionEnd;
  ta.value = ta.value.slice(0, s) + text + ta.value.slice(e);
  const pos = s + text.length; ta.setSelectionRange(pos, pos);
  autoGrow(ta); markBody(ta); ta.focus();
}
function handleTabIndent(e, ta){
  const UNIT = "  ";
  e.preventDefault();
  const val = ta.value;
  const s = ta.selectionStart, en = ta.selectionEnd;
  const outdent = e.shiftKey;
  const hasSel = s !== en;
  // No selection + Tab: just insert two spaces at the caret.
  if (!hasSel && !outdent){
    ta.value = val.slice(0, s) + UNIT + val.slice(s);
    ta.setSelectionRange(s + UNIT.length, s + UNIT.length);
    autoGrow(ta); markBody(ta); return;
  }
  // Otherwise operate on every line touched by the selection (or the current line).
  const lineStart = val.lastIndexOf("\n", s - 1) + 1;
  let lineEnd = val.indexOf("\n", en > s ? en - 1 : en);
  if (lineEnd === -1) lineEnd = val.length;
  const before = val.slice(0, lineStart), block = val.slice(lineStart, lineEnd), after = val.slice(lineEnd);
  let firstDelta = 0, totalDelta = 0;
  const lines = block.split("\n").map((ln, i) => {
    if (outdent){
      let rm = 0;
      if (ln.startsWith(UNIT)) rm = UNIT.length;
      else if (ln.startsWith("\t")) rm = 1;
      else { const m = ln.match(/^ +/); rm = m ? Math.min(UNIT.length, m[0].length) : 0; }
      if (i === 0) firstDelta = -rm;
      totalDelta -= rm;
      return ln.slice(rm);
    } else {
      if (i === 0) firstDelta = UNIT.length;
      totalDelta += UNIT.length;
      return UNIT + ln;
    }
  });
  ta.value = before + lines.join("\n") + after;
  const ns = Math.max(lineStart, s + firstDelta);
  const ne = Math.max(ns, en + totalDelta);
  ta.setSelectionRange(ns, ne);
  autoGrow(ta); markBody(ta);
}
async function handlePaste(e, ta){
  const items = e.clipboardData && e.clipboardData.items;
  if (!items) return;
  for (const it of items){
    if (it.kind === "file" && it.type && it.type.startsWith("image/")){
      e.preventDefault();
      const blob = it.getAsFile();
      if (blob) await saveImageAndInsert(blob, ta);
      return;
    }
  }
}
async function handleDrop(e, ta){
  const files = e.dataTransfer && e.dataTransfer.files;
  const imgs = files ? [...files].filter(f => f.type && f.type.startsWith("image/")) : [];
  ta.classList.remove("drag-over");
  if (!imgs.length) return;
  e.preventDefault();
  for (const blob of imgs) await saveImageAndInsert(blob, ta);
}
function pickImages(name){
  const inp = document.createElement("input");
  inp.type = "file"; inp.accept = "image/*"; inp.multiple = true;
  inp.onchange = async () => {
    const panel = [...$("#panes").querySelectorAll(".panel")].find(p => p.dataset.name === name);
    const ta = panel && panel.querySelector(".src-editor");
    if (!ta) return;

  };

}
async function saveImageAndInsert(blob, ta){
  if (!S.dirHandle){ alert("先にフォルダを開いてください。"); return; }
  const dirName = (S.attachDir || "attachments").replace(/^\/+|\/+$/g, "") || "attachments";
  const fromName = (blob.name && blob.name.includes(".")) ? blob.name.split(".").pop() : "";
  const ext = ((fromName || blob.type.split("/")[1] || "png").toLowerCase()).replace("jpeg","jpg").replace("svg+xml","svg");
  let base = "img";
  if (blob.name) { const b = blob.name.replace(/\.[^.]+$/, "").trim().replace(/[\/\\:\*\?"<>\|\s]+/g, "-"); if (b) base = b; }
  const fn = base + "-" + tstamp() + "." + ext;
  try {
    const dir = await S.dirHandle.getDirectoryHandle(dirName, { create: true });
    const fh = await dir.getFileHandle(fn, { create: true });
    const w = await fh.createWritable(); await w.write(blob); await w.close();
    insertAtCaret(ta, "![](" + dirName + "/" + fn + ")");
  } catch (e){ console.error(e); alert("画像の保存に失敗しました: " + e.message); }
}
async function getFileHandleByPath(path){
  const parts = decodeURIComponent(path).split("/").filter(p => p && p !== ".");
  let dir = S.dirHandle;
  for (let i = 0; i < parts.length - 1; i++) dir = await dir.getDirectoryHandle(parts[i]);
  return dir.getFileHandle(parts[parts.length - 1]);
}
async function resolveLocalImages(container){
  if (!S.dirHandle) return;
  for (const img of container.querySelectorAll("img[data-local]")){
    const p = img.getAttribute("data-local");
    try { const file = await (await getFileHandleByPath(p)).getFile(); img.src = URL.createObjectURL(file); }
    catch (e){ img.replaceWith(Object.assign(document.createElement("span"), { className: "img-missing", textContent: "🖼 画像が見つかりません: " + p })); }
  }
}

async function deleteNote(name){
  const f = S.files.get(name); if (!f) return;
  if (!confirm("「" + name + "」を完全に削除します。元に戻せません。よろしいですか？")) return;

/* ===================== Rename note ===================== */
function escapeReg(s){ return s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"); }
function sanitizeName(s){
  s = (s || "").trim().replace(/\.md$/i, "").trim();
  if (!s) return null;
  if (/[\/\\:\*\?"<>\|]/.test(s)) return null;
  return s;
}
function beginRename(f, titleEl){
  const input = el("input", "title-edit"); input.value = f.name;
  titleEl.replaceWith(input); input.focus(); input.select();
  let done = false;
  const finish = (commit) => {
    if (done) return; done = true;
    const val = input.value;
    if (commit) renameNote(f.name, val);
    else renderRight();
  };
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") { e.preventDefault(); finish(true); }
    else if (e.key === "Escape") { e.preventDefault(); finish(false); }
  });
  input.addEventListener("blur", () => finish(true));
}
async function renameNote(oldName, rawNew){
  const f = S.files.get(oldName); if (!f) { renderRight(); return; }
  const newName = sanitizeName(rawNew);
  if (!newName) { alert('ファイル名が不正です。/ \\ : * ? " < > | は使えません。'); renderRight(); return; }
  if (newName === oldName) { renderRight(); return; }
  if (S.files.has(newName) && !S.files.get(newName).virtual) { alert("同名のノートが既に存在します。"); renderRight(); return; }
  try {
    const newFull = newName + ".md";
    const nh = await S.dirHandle.getFileHandle(newFull, { create: true });
    const w = await nh.createWritable(); await w.write(f.body); await w.close();
    if (f.handle && !f.virtual) { try { await S.dirHandle.removeEntry(f.fullName); } catch (e) {} }
    clearTimeout(S.timers.get(oldName)); S.timers.delete(oldName);
    S.files.delete(oldName);
    f.name = newName; f.fullName = newFull; f.handle = nh; f.virtual = false; f.dirty = false; f.mtime = Date.now();
    S.files.set(newName, f);
    S.open = S.open.map(n => n === oldName ? newName : n);
    await updateLinksOnRename(oldName, newName);
    renderRight(); renderLeft(); renderMid(); markMidActive();
  } catch (e) { console.error(e); alert("名前の変更に失敗しました: " + e.message); renderRight(); }
}
async function updateLinksOnRename(oldName, newName){
  for (const g of S.files.values()){
    if (g.virtual || !g.handle) continue;
    const nb = g.body.replace(/\[\[([^\]]+)\]\]/g, (m, inner) => inner.trim() === oldName ? "[[" + newName + "]]" : m);
    if (nb !== g.body){
      g.body = nb;
      try { const w = await g.handle.createWritable(); await w.write(nb); await w.close(); g.dirty = false; g.mtime = Date.now(); }
      catch (e) { console.error(e); }
    }
  }
}

/* ===================== Folder persistence (IndexedDB) ===================== */
function idbDB(){ return new Promise((res, rej) => { const r = indexedDB.open("mdnotes", 1); r.onupgradeneeded = () => r.result.createObjectStore("kv"); r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error); }); }
async function idbSet(k, v){ const db = await idbDB(); return new Promise((res, rej) => { const tx = db.transaction("kv","readwrite"); tx.objectStore("kv").put(v, k); tx.oncomplete = () => res(); tx.onerror = () => rej(tx.error); }); }
async function idbGet(k){ const db = await idbDB(); return new Promise((res, rej) => { const tx = db.transaction("kv","readonly"); const rq = tx.objectStore("kv").get(k); rq.onsuccess = () => res(rq.result); rq.onerror = () => rej(rq.error); }); }
async function restoreFolder(){
  let handle; try { handle = await idbGet("dir"); } catch (e) { return; }
  if (!handle) return;
  let perm = "prompt";
  try { perm = await handle.queryPermission({ mode: "readwrite" }); } catch (e) {}
  if (perm === "granted"){ S.dirHandle = handle; await scanFolder(); return; }
  const w = $("#reopenWrap"); if (!w) return;
  w.style.display = "block"; w.innerHTML = "";
  const b = el("button", "btn", "前回のフォルダ「" + handle.name + "」を開く");
  b.onclick = async () => { try { const p = await handle.requestPermission({ mode: "readwrite" }); if (p === "granted"){ S.dirHandle = handle; await scanFolder(); } } catch (e) { console.error(e); } };
  w.appendChild(b);
}

/* ===================== Markdown rendering ===================== */
function esc(s){ return s.replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

function renderInline(text){
  let h = esc(text);
  const codes = [];
  h = h.replace(/`([^`]+)`/g, (m,a) => { codes.push(a); return "\u0000C" + (codes.length-1) + "\u0000"; });
  h = h.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (m,alt,u) => {
    u = u.trim();
    if (/^https?:\/\//.test(u)) return `<img class="md-img" src="${u}" alt="${alt}">`;
    return `<img class="md-img" data-local="${esc(u)}" alt="${esc(alt)}">`;
  });
  h = h.replace(new RegExp("(^|[\\s(])[#＃]([" + TAG_CH + "]+)", "g"), (m,pre,tag) => `${pre}<span class="tag" data-tag="${tag}">#${tag}</span>`);
  h = h.replace(/\[\[([^\]]+)\]\]/g, (m, raw) => {
    const name = raw.trim();
    const ex = S.files.has(name) && !(S.files.get(name) && S.files.get(name).virtual);
    return `<span class="wikilink${ex?"":" empty"}" data-link="${esc(name)}">${esc(name)}</span>`;
  });
  h = h.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, (m,t,u) => `<a class="ext" href="${u}" target="_blank" rel="noopener">${t}</a>`);
  h = h.replace(/&lt;(https?:\/\/[^\s&]+)&gt;/g, (m,u) => `<a class="ext" href="${u}" target="_blank" rel="noopener">${u}</a>`);
  h = h.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  h = h.replace(/(^|[\s(])__([^_]+)__(?=[\s).,;:!?]|$)/g, "$1<strong>$2</strong>");
  h = h.replace(/(^|[^*])\*([^*\n]+)\*/g, "$1<em>$2</em>");
  h = h.replace(/(^|[\s(])_([^_\n]+)_(?=[\s).,;:!?]|$)/g, "$1<em>$2</em>");
  h = h.replace(/~~([^~]+)~~/g, "<del>$1</del>");
  h = h.replace(/\u0000C(\d+)\u0000/g, (m,n) => `<code>${codes[+n]}</code>`);
  return h;
}
function isBlockStart(line){
  return /^(```|~~~)/.test(line) || /^#{1,6}\s/.test(line) || /^\s*>/.test(line)
    || /^(\s*)([-*+]|\d+[.)])\s+/.test(line) || /^\s*([-*_])(\s*\1){2,}\s*$/.test(line)
    || /^\s*\|.*\|\s*$/.test(line);
}
function renderList(blockLines){
  const items = [];
  for (const raw of blockLines){
    const m = raw.match(/^(\s*)([-*+]|\d+[.)])\s+(.*)$/);
    if (m) items.push({ indent: Math.floor(m[1].replace(/\t/g,"  ").length / 2), ordered: /\d/.test(m[2]), text: m[3] });
    else if (items.length) items[items.length-1].text += " " + raw.trim();
  }
  let html = ""; const stack = [];
  for (const it of items){
    while (stack.length && it.indent < stack[stack.length-1].indent){ const t = stack.pop(); html += t.ordered ? "</ol>" : "</ul>"; }
    const top = stack[stack.length-1];
    if (top && it.indent === top.indent && it.ordered !== top.ordered){ stack.pop(); html += top.ordered ? "</ol>" : "</ul>"; }
    if (!stack.length || it.indent > stack[stack.length-1].indent){ html += it.ordered ? "<ol>" : "<ul>"; stack.push({ ordered: it.ordered, indent: it.indent }); }
    html += "<li>" + renderInline(it.text) + "</li>";
  }
  while (stack.length){ const t = stack.pop(); html += t.ordered ? "</ol>" : "</ul>"; }
  return html;
}
function renderMarkdown(src){
  const lines = (src || "").replace(/\r\n?/g, "\n").split("\n");
  let html = "", i = 0;
  while (i < lines.length){
    const line = lines[i];
    const fence = line.match(/^(```|~~~)(.*)$/);
    if (fence){
      const marker = fence[1]; i++;
      const code = [];
      while (i < lines.length && !lines[i].startsWith(marker)){ code.push(lines[i]); i++; }
      i++;
      html += '<pre class="code-block"><code>' + esc(code.join("\n")) + '</code></pre>';
      continue;
    }
    if (line.trim() === ""){ i++; continue; }
    if (/^\s*([-*_])(\s*\1){2,}\s*$/.test(line)){ html += "<hr>"; i++; continue; }
    const hm = line.match(/^(#{1,6})\s+(.*)$/);
    if (hm){ const lvl = hm[1].length; html += `<h${lvl}>${renderInline(hm[2])}</h${lvl}>`; i++; continue; }
    if (/^\s*>/.test(line)){
      const quote = [];
      while (i < lines.length && /^\s*>/.test(lines[i])){ quote.push(lines[i].replace(/^\s*>\s?/, "")); i++; }
      html += "<blockquote>" + renderMarkdown(quote.join("\n")) + "</blockquote>";
      continue;
    }
    if (/^\s*\|.*\|\s*$/.test(line) && i+1 < lines.length && /^\s*\|?[\s:|-]*-[\s:|-]*\|?\s*$/.test(lines[i+1])){
      const parseRow = r => r.trim().replace(/^\|/, "").replace(/\|$/, "").split("|").map(c => c.trim());
      const headers = parseRow(line); i += 2;
      const rows = [];
      while (i < lines.length && /^\s*\|.*\|\s*$/.test(lines[i])){ rows.push(parseRow(lines[i])); i++; }
      let t = "<table><thead><tr>" + headers.map(c => `<th>${renderInline(c)}</th>`).join("") + "</tr></thead><tbody>";
      for (const r of rows) t += "<tr>" + r.map(c => `<td>${renderInline(c)}</td>`).join("") + "</tr>";
      html += t + "</tbody></table>";
      continue;
    }
    if (/^(\s*)([-*+]|\d+[.)])\s+/.test(line)){
      const block = [];
      while (i < lines.length && (/^(\s*)([-*+]|\d+[.)])\s+/.test(lines[i]) || (lines[i].trim() !== "" && /^\s+\S/.test(lines[i])))){ block.push(lines[i]); i++; }
      html += renderList(block);
      continue;
    }
    const para = [line]; i++;
    while (i < lines.length && lines[i].trim() !== "" && !isBlockStart(lines[i])){ para.push(lines[i]); i++; }
    html += "<p>" + para.map(renderInline).join("<br>") + "</p>";
  }
  return html;
}

/* ===================== Table of contents ===================== */
function extractHeadings(body){
  const lines = (body || "").replace(/\r\n?/g, "\n").split("\n");
  const out = []; let inFence = false, marker = "";
  for (let li = 0; li < lines.length; li++){
    const line = lines[li];
    const f = line.match(/^(```|~~~)/);
    if (f){ if (!inFence){ inFence = true; marker = f[1]; } else if (line.startsWith(marker)){ inFence = false; } continue; }
    if (inFence) continue;
    if (/^\s*>/.test(line)) continue;
    const m = line.match(/^(#{1,6})\s+(.*)$/);
    if (m) out.push({ level: m[1].length, text: m[2].trim(), line: li });
  }
  return out;
}
function buildToc(f){
  const heads = extractHeadings(f.body);
  if (!heads.length) return null;
  const box = el("div", "toc");
  const head = el("div", "bl-head"); head.appendChild(el("span", null, "目次")); box.appendChild(head);
  const list = el("div", "toc-list");
  heads.forEach((hd, k) => {
    const item = el("div", "toc-item lv" + hd.level, hd.text || "（無題）");
    item.title = hd.text;
    item.onclick = () => gotoHeading(f.name, k, hd.line);
    list.appendChild(item);
  });
  box.appendChild(list);
  return box;
}
function gotoHeading(name, k, lineIdx){
  const panel = [...$("#panes").querySelectorAll(".panel")].find(p => p.dataset.name === name);
  if (!panel) return;
  const scroller = panel.querySelector(".panel-scroll");
  if (S.mode === "edit") {
    const ta = panel.querySelector(".src-editor"); if (!ta) return;
    const parts = ta.value.split("\n");
    let off = 0; for (let i = 0; i < lineIdx && i < parts.length; i++) off += parts[i].length + 1;
    if (scroller) {
      const lh = parseFloat(getComputedStyle(ta).lineHeight) || 26;
      const taTop = ta.getBoundingClientRect().top - scroller.getBoundingClientRect().top + scroller.scrollTop;
      scroller.scrollTop = Math.max(0, taTop + lineIdx * lh - 16);
    }
    ta.focus(); ta.setSelectionRange(off, off);
  } else {
    const hs = panel.querySelectorAll(".md-rendered h1, .md-rendered h2, .md-rendered h3, .md-rendered h4, .md-rendered h5, .md-rendered h6");
    const target = hs[k];
    if (target && scroller) {
      const top = target.getBoundingClientRect().top - scroller.getBoundingClientRect().top + scroller.scrollTop;
      scroller.scrollTo({ top: Math.max(0, top - 14), behavior: "smooth" });
    }
  }
}

/* ===================== Dirty + Save (per file) ===================== */
function markBody(ta){
  const panel = ta.closest(".panel"); if (!panel) return;
  const name = panel.dataset.name;
  const f = fileFor(name);
  f.body = ta.value; f.dirty = true;
  scheduleSave(name); updateSaveState();
}
function scheduleSave(name){ clearTimeout(S.timers.get(name)); S.timers.set(name, setTimeout(() => flushSave(name), 800)); }
async function flushSave(name){
  const f = S.files.get(name); if (!f || !f.dirty) return;
  clearTimeout(S.timers.get(name));
  try {
    if (!f.handle) { f.handle = await S.dirHandle.getFileHandle(f.fullName, { create: true }); f.virtual = false; }
    const w = await f.handle.createWritable(); await w.write(f.body); await w.close();
    f.mtime = Date.now(); f.loaded = true; f.dirty = false;
    updateSaveState(); renderLeft(); updateMidCard(f); refreshLinkExistence();
  } catch (e) { console.error(e); $("#saveState").textContent = "保存失敗"; }
}
async function flushAllDirty(){ for (const f of [...S.files.values()]) if (f.dirty) await flushSave(f.name); }
function updateSaveState(){
  const anyDirty = [...S.files.values()].some(f => f.dirty);
  const ss = $("#saveState");
  ss.textContent = anyDirty ? "未保存…" : (S.open.length ? "保存済み" : "");
  ss.classList.toggle("dirty", anyDirty);
}

/* ===================== Links / tags click ===================== */
function bindLinkClicks(root) {
  root.querySelectorAll(".wikilink").forEach(w => {
    if (w.dataset.bound) return; w.dataset.bound = "1";
    w.addEventListener("click", (e) => { e.stopPropagation(); openNote(w.dataset.link, e.metaKey || e.ctrlKey || e.shiftKey); });
  });
  root.querySelectorAll(".md-rendered .tag").forEach(t => {
    if (t.dataset.bound) return; t.dataset.bound = "1";
    t.addEventListener("click", (e) => { e.stopPropagation(); S.tags = new Set([t.dataset.tag]); refresh(); });
  });
}
function refreshLinkExistence(){
  document.querySelectorAll(".wikilink").forEach(w => {
    const ex = S.files.has(w.dataset.link) && !S.files.get(w.dataset.link).virtual;
    w.classList.toggle("empty", !ex);
  });
}

/* ===================== Backlinks + 2hop ===================== */
function buildLinkBlock(name, mode) {   // mode: "side" | "below"
  const block = el("div", "linkblock " + mode);

  const back = [];
  for (const f of S.files.values()) { if (f.name === name) continue; if (linksIn(f.body).has(name)) back.push(f); }
  const head = el("div", "bl-head"); head.appendChild(el("span", null, "バックリンク")); head.appendChild(el("span", "count", String(back.length)));
  block.appendChild(head);

  if (!back.length) block.appendChild(el("div", "bl-empty", "このページを参照しているノートはまだありません。"));
  else {
    const grid = el("div", "bl-grid");
    for (const f of back) {
      const c = el("div", "blcard");
      c.style.setProperty("--card-accent", accentFor(f));
      c.appendChild(el("div", "bt", f.name));
      const ctx = makeContext(f.body, name); ctx.className = "bc";
      c.appendChild(ctx);
      c.onclick = (e) => openNote(f.name, e.metaKey || e.ctrlKey || e.shiftKey);
      grid.appendChild(c);
    }
    block.appendChild(grid);
  }

  const groups = [];
  for (const f of back) { const others = [...linksIn(f.body)].filter(n => n !== name); if (others.length) groups.push({ via: f.name, links: others }); }
  if (groups.length) {
    const h2 = el("div", "bl-head"); h2.appendChild(el("span", null, "2-hop リンク")); block.appendChild(h2);
    for (const g of groups) {
      const grp = el("div", "twohop-group");
      const via = el("div", "twohop-via"); via.innerHTML = `<b>${esc(g.via)}</b> からつながるノート`; grp.appendChild(via);
      const chips = el("div", "twohop-chips");
      g.links.forEach(n => { const ex = S.files.has(n) && !S.files.get(n).virtual; const chip = el("div", "chip" + (ex?"":" empty"), n); chip.onclick = (e) => openNote(n, e.metaKey || e.ctrlKey || e.shiftKey); chips.appendChild(chip); });
      grp.appendChild(chips); block.appendChild(grp);
    }
  }
  return block;
}
function makeContext(body, name) {
  const div = el("div", "ctx");
  const lines = body.split("\n");
  const hit = lines.find(l => l.includes("[["+name+"]]")) || lines.find(l => l.includes(name)) || "";
  let h = esc(hit.slice(0, 160));
  h = h.replace(new RegExp("\\[\\["+name.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+"\\]\\]","g"), `<mark>${esc(name)}</mark>`);
  div.innerHTML = h || "…"; return div;
}

/* ===================== Autocomplete [[ ]] ===================== */
const acState = { open:false, ta:null, start:0, items:[], sel:0 };
function handleAutocomplete(ta) {
  const pos = ta.selectionStart;
  const before = ta.value.slice(0, pos);
  const m = before.match(/\[\[([^\]\n]*)$/);
  const ac = $("#ac");
  if (!m) { hideAC(); return; }
  const query = m[1].toLowerCase();
  const names = [...S.files.keys()].filter(n => !S.files.get(n).virtual && n.toLowerCase().includes(query)).slice(0,8);
  const exactNew = query && ![...S.files.keys()].some(n => n.toLowerCase() === query);
  acState.items = names.map(n => ({label:n, isNew:false}));
  if (exactNew) acState.items.push({label: m[1], isNew:true});
  if (!acState.items.length) { hideAC(); return; }
  acState.open = true; acState.ta = ta; acState.start = pos - m[1].length; acState.sel = 0;
  renderAC();
  const rect = ta.getBoundingClientRect();
  ac.style.left = (rect.left + 8) + "px"; ac.style.top = (rect.bottom + 2) + "px"; ac.style.display = "block";
}
function renderAC() {
  const ac = $("#ac"); ac.innerHTML = "";
  acState.items.forEach((it,i) => { const d = el("div", "ac-item"+(i===acState.sel?" sel":"")+(it.isNew?" new":""), it.isNew ? `＋ 新規「${it.label}」` : it.label); d.onmousedown = (e) => { e.preventDefault(); pickAC(i); }; ac.appendChild(d); });
}
function acKey(e) {
  if (e.key === "ArrowDown") { e.preventDefault(); acState.sel = (acState.sel+1)%acState.items.length; renderAC(); }
  else if (e.key === "ArrowUp") { e.preventDefault(); acState.sel = (acState.sel-1+acState.items.length)%acState.items.length; renderAC(); }
  else if (e.key === "Enter" || e.key === "Tab") { e.preventDefault(); pickAC(acState.sel); }
  else if (e.key === "Escape") { e.preventDefault(); hideAC(); }
}
function pickAC(i) {
  const it = acState.items[i]; if (!it) return;
  const ta = acState.ta; const pos = ta.selectionStart;
  const before = ta.value.slice(0, acState.start), after = ta.value.slice(pos);
  const insert = it.label + "]]";
  ta.value = before + insert + (after.startsWith("]]") ? after.slice(2) : after);
  const caret = (before + insert).length; ta.setSelectionRange(caret, caret);
  hideAC(); autoGrow(ta); markBody(ta); ta.focus();
}
function hideAC(){ acState.open = false; $("#ac").style.display = "none"; }

/* ===================== Mode ===================== */
function setMode(m) {
  if (!S.open.length) return;
  if (m === S.mode) { setModeButtons(); return; }
  // capture vertical scroll fraction per panel so the view stays put across the re-render
  const anchors = {};
  $("#panes").querySelectorAll(".panel").forEach(p => {
    const sc = p.querySelector(".panel-scroll");
    if (sc) { const denom = sc.scrollHeight - sc.clientHeight; anchors[p.dataset.name] = denom > 0 ? sc.scrollTop / denom : 0; }
  });
  if (m === "read") flushAllDirty();
  S.mode = m; setModeButtons();
  renderRight();
  requestAnimationFrame(() => {
    $("#panes").querySelectorAll(".panel").forEach(p => {
      const sc = p.querySelector(".panel-scroll");
      const fr = anchors[p.dataset.name];
      if (sc && fr != null) { const denom = sc.scrollHeight - sc.clientHeight; sc.scrollTop = fr * denom; }
    });
    if (m === "edit") { const ta = $("#panes").querySelector(".src-editor"); if (ta) ta.focus({ preventScroll: true }); }
  });
}
function setModeButtons() { $("#readBtn").classList.toggle("on", S.mode === "read"); $("#editBtn").classList.toggle("on", S.mode === "edit"); }

/* ===================== New note ===================== */
async function newNote() {
  if (!S.dirHandle) { await openFolder(); if (!S.dirHandle) return; }
  let name = prompt("ノート名（拡張子なし）", "新規ノート"); if (!name) return;
  name = name.replace(/\.md$/i,"").trim(); if (!name) return;
  if (S.files.has(name) && !S.files.get(name).virtual) { openNote(name); return; }
  const f = { handle: null, name, fullName: name + ".md", body: "# " + name + "\n\n", loaded: true, mtime: Date.now() };
  S.files.set(name, f);
  S.open = [name];
  S.mode = "edit"; setModeButtons();
  renderRight();
  f.dirty = true; await flushSave(name);
  renderLeft(); renderMid(); markMidActive();
  const ta = $("#panes").querySelector(".src-editor"); if (ta) { ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); }
}

/* Add a new note as an extra pane on the right, keeping current panes open. */
async function newNotePane() {
  if (!S.dirHandle) { await openFolder(); if (!S.dirHandle) return; }
  let name = prompt("新規ノート名（拡張子なし）", "新規ノート"); if (!name) return;
  name = name.replace(/\.md$/i,"").trim(); if (!name) return;
  await flushAllDirty();
  const existed = S.files.has(name) && !S.files.get(name).virtual;
  let f = S.files.get(name);
  if (!f) { f = { handle: null, name, fullName: name + ".md", body: "# " + name + "\n\n", loaded: true, mtime: Date.now() }; S.files.set(name, f); }
  if (!S.open.includes(name)) { S.open.push(name); if (S.open.length > MAX_PANES) S.open.shift(); }
  S.mode = "edit"; setModeButtons();
  renderRight();
  if (!existed && !f.handle) { f.dirty = true; await flushSave(name); }
  renderLeft(); renderMid(); markMidActive();
  const panel = [...$("#panes").querySelectorAll(".panel")].find(p => p.dataset.name === name);
  const ta = panel && panel.querySelector(".src-editor");
  if (ta) { ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); }
}

/* ===================== Type-tag config modal ===================== */
function openTypeModal(){ renderTypeModal(); $("#modalVault").textContent = S.dirHandle ? (S.dirHandle.name + " · " + S.files.size + "件") : "フォルダ未選択"; $("#typeModal").classList.add("open"); }
function closeTypeModal(){ $("#typeModal").classList.remove("open"); }
function allTagNames(){
  const set = new Set();
  for (const f of S.files.values()) { if (f.virtual) continue; for (const t of tagsIn(f.body)) set.add(t); }
  return [...set].sort();
}
function renderTypeModal(){
  $("#attachDirInput").value = S.attachDir || "attachments";
  const dl = $("#tagDatalist"); dl.innerHTML = "";
  allTagNames().forEach(t => { const o = document.createElement("option"); o.value = t; dl.appendChild(o); });
  const list = $("#typeList"); list.innerHTML = "";
  if (!S.types.length) { list.appendChild(el("div", "type-empty", "まだタイプタグはありません。下で追加してください。")); return; }
  S.types.forEach((ty, idx) => {
    const row = el("div", "type-row");
    const col = document.createElement("input"); col.type = "color"; col.value = ty.color;
    col.oninput = () => { S.types[idx].color = col.value; saveTypes(); applyTypeChange(); };
    const nm = el("span", "tn", "#" + ty.tag);
    const rm = el("button", "rm", "×"); rm.title = "削除";
    rm.onclick = () => { S.types.splice(idx, 1); saveTypes(); renderTypeModal(); applyTypeChange(); };
    row.appendChild(col); row.appendChild(nm); row.appendChild(rm);
    list.appendChild(row);
  });
}
function addType(){
  let t = $("#typeAddInput").value.trim().replace(/^[#＃]/, "");
  if (!t) return;
  if (S.types.some(x => x.tag === t)) { $("#typeAddInput").value = ""; return; }
  S.types.push({ tag: t, color: $("#typeAddColor").value || "#2f6f5e" });
  saveTypes();
  $("#typeAddInput").value = "";
  renderTypeModal(); applyTypeChange();
}
function applyTypeChange(){ renderLeft(); renderMid(); markMidActive(); renderRight(); markMidActive(); }

/* ===================== Wiring ===================== */
$("#settingsBtn").onclick = openTypeModal;
$("#openBtnModal").onclick = async () => { await openFolder(); if (S.dirHandle) { $("#modalVault").textContent = S.dirHandle.name + " · " + S.files.size + "件"; closeTypeModal(); } };
$("#openBtn2").onclick = openFolder;
$("#newBtn").onclick = newNote;
$("#brand").onclick = () => { if (!S.dirHandle) return; S.tags.clear(); $("#search").value = ""; refresh(); };
$("#collapseLeftBtn").onclick = () => $("#app").classList.add("left-collapsed");
$("#showLeftBtn").onclick = () => $("#app").classList.remove("left-collapsed");
$("#collapseMidBtn").onclick = () => $("#app").classList.add("mid-collapsed");
$("#showMidBtn").onclick = () => $("#app").classList.remove("mid-collapsed");
$("#addPaneBtn").onclick = newNotePane;
$("#typeClose").onclick = closeTypeModal;
$("#typeAddBtn").onclick = addType;
$("#typeAddInput").addEventListener("keydown", (e) => { if (e.key === "Enter") { e.preventDefault(); addType(); } });
$("#typeModal").addEventListener("click", (e) => { if (e.target.id === "typeModal") closeTypeModal(); });
$("#attachDirInput").addEventListener("change", () => {
  const v = $("#attachDirInput").value.trim().replace(/^\/+|\/+$/g, "");
  S.attachDir = v || "attachments";
  $("#attachDirInput").value = S.attachDir;
  saveTypes();
});
$("#readBtn").onclick = () => setMode("read");
$("#editBtn").onclick = () => setMode("edit");
$("#tabList").onclick = () => { S.midView = "list"; renderMid(); markMidActive(); };
$("#tabCal").onclick = () => { S.midView = "calendar"; renderMid(); };
$("#search").addEventListener("input", () => { renderMid(); markMidActive(); });

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape" && $("#typeModal").classList.contains("open")) { closeTypeModal(); return; }
  if ((e.metaKey || e.ctrlKey) && e.key === "s") { e.preventDefault(); flushAllDirty(); }
  if ((e.metaKey || e.ctrlKey) && e.key === "e") { e.preventDefault(); setMode(S.mode === "edit" ? "read" : "edit"); }
  if ((e.metaKey || e.ctrlKey) && e.key === "k") { e.preventDefault(); $("#search").focus(); }
  if ((e.metaKey || e.ctrlKey) && e.key === "\\") { e.preventDefault(); $("#app").classList.toggle("left-collapsed"); }
});
window.addEventListener("beforeunload", (e) => { if ([...S.files.values()].some(f => f.dirty)) { flushAllDirty(); e.preventDefault(); e.returnValue=""; } });

restoreFolder();
</script>
